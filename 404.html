<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Aura Wellness Spa</title>
    <link rel="icon" href="/assets/logo-main.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=Marcellus&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --font-logo: "Marcellus", serif;
            --font-navigation: "Inter", sans-serif;
            --font-heading: "Cormorant", serif;
        }

        body {
            min-height: 100vh;
            font-family: var(--font-navigation);
            color: #111827;
            background:
                linear-gradient(rgba(249, 250, 251, 0.78), rgba(249, 250, 251, 0.94)),
                url("https://i.pinimg.com/1200x/33/89/06/338906e77a693d677562820918c364d3.jpg") center / cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .not-found {
            width: min(920px, 100%);
            min-height: min(680px, calc(100vh - 48px));
            display: grid;
            place-items: center;
            text-align: center;
            padding: clamp(36px, 7vw, 72px);
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 30px 90px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(18px);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #111827;
            text-decoration: none;
            font-family: var(--font-logo);
            font-weight: 700;
            margin-bottom: 44px;
        }

        .logo img {
            width: 44px;
            height: 44px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0d9488;
            background: #ecfdf5;
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(72px, 17vw, 148px);
            font-weight: 600;
            line-height: 0.9;
            color: #111827;
            margin-bottom: 18px;
        }

        h2 {
            font-family: var(--font-heading);
            font-size: clamp(34px, 7vw, 56px);
            font-weight: 600;
            line-height: 1.08;
            margin-bottom: 18px;
        }

        p {
            max-width: 560px;
            margin: 0 auto 32px;
            color: #4b5563;
            font-size: 16px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
            padding: 14px 24px;
            border-radius: 999px;
            color: #ffffff;
            background: #0d9488;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            background: #0f766e;
            transform: translateY(-2px);
        }

        .btn-secondary {
            color: #374151;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #e5e7eb;
        }

        .btn-secondary:hover {
            color: #111827;
            background: #ffffff;
        }

        @media (max-width: 560px) {
            body {
                padding: 12px;
            }

            .not-found {
                min-height: calc(100vh - 24px);
                border-radius: 20px;
                padding: 30px 20px;
            }

            .logo {
                margin-bottom: 34px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="not-found">
        <div>
            <a href="/" class="logo">
                <img src="/assets/logo-main.png" alt="Aura Wellness Spa Logo">
                <span>Aura Wellness Spa</span>
            </a>

            <div class="eyebrow"><i class="fa-solid fa-spa"></i> Page Not Found</div>
            <h1>404</h1>
            <h2>This page slipped into quiet mode.</h2>
            <p>The page you are looking for is unavailable, but your path back to relaxation is still open.</p>

            <div class="actions">
                <a href="/" class="btn">Return Home <i class="fa-solid fa-arrow-right"></i></a>
                <a href="/#contact" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
    </main>
</body>
</html>
